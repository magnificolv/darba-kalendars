// Fetch with timeout
async function fetchWithTimeout(url, options, timeoutMs) {
  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, timeoutMs || 120000);
  try {
    var res = await fetch(url, Object.assign({}, options, { signal: controller.signal }));
    clearTimeout(timer);
    return res;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === "AbortError") throw new Error("Timeout — serveris neatbildēja 2 min laikā");
    throw e;
  }
}

// Call Gemini API (works everywhere with user's API key)
async function callGemini(pdfParts, promptText, apiKey) {
  var parts = [];
  for (var i = 0; i < pdfParts.length; i++) {
    parts.push({ inline_data: { mime_type: "application/pdf", data: pdfParts[i] } });
  }
  parts.push({ text: promptText });
  var res = await fetchWithTimeout(GEMINI_API_URL + "?key=" + apiKey, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: parts }] }),
  }, 120000);
  var data = await res.json();
  if (data.error) throw new Error("Gemini: " + (data.error.message || JSON.stringify(data.error)));
  if (!data.candidates || !data.candidates[0]) throw new Error("Gemini: nav atbildes");
  var text = data.candidates[0].content.parts.map(function(p) { return p.text || ""; }).filter(Boolean).join("");
  if (!text) throw new Error("Gemini: tukša atbilde");
  return text;
}

  }
  var result = await callGemini(pdfParts, promptText, geminiKey);
  return { text: result, provider: "Gemini" };
}

function toBase64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result.split(",")[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function matchesDow(pattern, dow) {
  if (!pattern || pattern === "1-7d") return true;
  var p = pattern.replace(/d$/i, "");
  var parts = p.split(",");
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i];
    if (part.includes("-")) {
      var ab = part.split("-").map(Number);
      if (dow >= ab[0] && dow <= ab[1]) return true;
    } else if (parseInt(part) === dow) return true;
  }
  return false;
}

function getBestVariant(variants, dow) {
  if (!variants || variants.length === 0) return null;
  return variants.find(function(v) { return matchesDow(v.dayPattern, dow); }) || variants[0];
}

// Check if shift crosses midnight (end time < start time)
function crossesMidnight(start, end) {
  if (!start || !end || start === "?" || end === "?") return false;
  var sh = start.split(":").map(Number);
  var eh = end.split(":").map(Number);
  return (eh[0] * 60 + eh[1]) < (sh[0] * 60 + sh[1]);
}

function calcHours(start, end) {
  if (!start || !end || start === "?" || end === "?") return null;
  var sh = start.split(":").map(Number);
  var eh = end.split(":").map(Number);
  var m = (eh[0] * 60 + eh[1]) - (sh[0] * 60 + sh[1]);
  if (m < 0) m += 1440;
  return (m / 60).toFixed(1);
}

function normalizeTour(raw) {
  if (!raw) return raw;
  var s = String(raw).trim();
  if (!s || s.toLowerCase() === "b" || s === "-") return s;
  if (s.includes("/")) return s;
  if (/^7\d{4}$/.test(s)) return s.slice(0, 3) + "/" + s.slice(3);
  return s;
}

function lookupTour(tours, id) {
  if (!tours || !id) return null;
  if (tours[id]) return tours[id];
  var n = normalizeTour(id);
  if (n !== id && tours[n]) return tours[n];
  var ns = id.replace("/", "");
  if (ns !== id && tours[ns]) return tours[ns];
  var idClean = id.replace(/[\s/]/g, "").toLowerCase();
  var nClean = n.replace(/[\s/]/g, "").toLowerCase();
  var keys = Object.keys(tours);
  for (var i = 0; i < keys.length; i++) {
    var kClean = keys[i].replace(/[\s/]/g, "").toLowerCase();
    if (kClean === idClean || kClean === nClean) return tours[keys[i]];
  }
  return null;
}

function parseGeminiText(text) {
  var lines = text.split(/\n/).map(function(l) { return l.trim(); }).filter(Boolean);
  var result = {};
  var detectedMonth = null;
  var detectedYear = null;

  var headerLines = lines.slice(0, 6);
  for (var h = 0; h < headerLines.length; h++) {
    var line = headerLines[h];
    var ym = line.match(/(\d{4})/);
    if (ym) detectedYear = parseInt(ym[1]);
    for (var mi = 1; mi <= 12; mi++) {
      if (line.toLowerCase().includes(MONTH_LV[mi].toLowerCase())) { detectedMonth = mi; break; }
    }
    var eng = ["","january","february","march","april","may","june","july","august","september","october","november","december"];
    for (var ei = 1; ei <= 12; ei++) {
      if (line.toLowerCase().includes(eng[ei])) { detectedMonth = ei; break; }
    }
  }

  for (var li = 0; li < lines.length; li++) {
    var ln = lines[li];
    if (/^[-|=\s]+$/.test(ln)) continue;
    var dayMatch = ln.match(/(?:^|\||\s)(\d{1,2})(?:\s*[:.\-|]|\s+)/);
    if (!dayMatch) continue;
    var day = parseInt(dayMatch[1]);
    if (day < 1 || day > 31) continue;
    var rest = ln.slice(ln.indexOf(dayMatch[0]) + dayMatch[0].length).trim()
      .replace(/\|/g, " ").replace(/\*\*/g, "").trim();
    if (!rest) continue;
    var prevNight = /^\/\s*\d/.test(rest) || rest.includes("(/)") || /overnight|prev/i.test(rest);
    var tourMatch = rest.match(/\b(7\d{3,4})\b/);
    var isOff = /^\s*b\s*$/i.test(rest.replace(/[/\s]/g, "")) || /\bbrīv/i.test(rest) || /\bfree\b/i.test(rest) || /\boff\b/i.test(rest);
    var isDuty = /^\s*d\s*$/i.test(rest.replace(/[/\s]/g, "")) || /^\s*d\s*\d/i.test(rest.replace(/[/\s]/g, ""));
    var dutyHours = 16;
    if (isDuty) {
      var dMatch = rest.match(/d\s*(\d+\.?\d*)/i);
      if (dMatch) dutyHours = parseFloat(dMatch[1]);
    }
    if (isOff) {
      result[day] = { tour: "b", prevNight: false };
    } else if (isDuty) {
      result[day] = { tour: "D", prevNight: false, dutyHours: dutyHours };
    } else if (tourMatch) {
      result[day] = { tour: normalizeTour(tourMatch[1]), prevNight: prevNight };
    }
  }
  return { schedule: result, month: detectedMonth, year: detectedYear };
}

// Auto-format time input: 1530 → 15:30, 930 → 9:30, 08:30 stays
function autoFormatTime(val) {
  var clean = val.replace(/[^0-9:]/g, "");
  if (clean.includes(":")) return clean;
  if (clean.length === 4) return clean.slice(0, 2) + ":" + clean.slice(2);
  if (clean.length === 3) return clean.slice(0, 1) + ":" + clean.slice(1);

}

// Latvian public holidays (month-day) — fixed dates + Easter-based for each year
function getLvHolidays(year) {
  var fixed = [
    [1,1],   // Jaungada diena
    [5,1],   // Darba svētki
    [5,4],   // Neatkarības atjaunošanas diena
    [6,23],  // Līgo diena
    [6,24],  // Jāņu diena
    [11,18], // Proklamēšanas diena
    [12,24], // Ziemassvētku vakars
    [12,25], // Pirmie Ziemassvētki
    [12,26], // Otrie Ziemassvētki
    [12,31], // Vecgada diena
  ];
  // Easter calculation (Anonymous Gregorian algorithm)
  var a = year % 19;
  var b = Math.floor(year / 100);
  var c = year % 100;
  var d = Math.floor(b / 4);
  var e = b % 4;
  var f = Math.floor((b + 8) / 25);
  var g = Math.floor((b - f + 1) / 3);
  var h = (19 * a + b - d - g + 15) % 30;
  var i = Math.floor(c / 4);
  var k = c % 4;
  var l = (32 + 2 * e + 2 * i - h - k) % 7;
  var m = Math.floor((a + 11 * h + 22 * l) / 451);
  var month = Math.floor((h + l - 7 * m + 114) / 31);
  var day = ((h + l - 7 * m + 114) % 31) + 1;
  // Easter Sunday
  var easter = new Date(year, month - 1, day);
  // Good Friday = Easter - 2, Easter Monday = Easter + 1
  var goodFriday = new Date(easter); goodFriday.setDate(easter.getDate() - 2);
  var easterMon = new Date(easter); easterMon.setDate(easter.getDate() + 1);
  // Whit Sunday (Vasarsvētki) = Easter + 49
  var whit = new Date(easter); whit.setDate(easter.getDate() + 49);
  fixed.push([goodFriday.getMonth() + 1, goodFriday.getDate()]);  // Lielā piektdiena
  fixed.push([easter.getMonth() + 1, easter.getDate()]);          // Pirmās Lieldienas
  fixed.push([easterMon.getMonth() + 1, easterMon.getDate()]);    // Otrās Lieldienas
  fixed.push([whit.getMonth() + 1, whit.getDate()]);              // Vasarsvētki
  return fixed;
}

function isLvHoliday(year, month, day) {
  var holidays = getLvHolidays(year);
  for (var i = 0; i < holidays.length; i++) {
    if (holidays[i][0] === month && holidays[i][1] === day) return true;
  }
  return false;
}

// Calculate night hours (22:00-06:00) for a shift
// For true overnight (same tour both days): count full 22:00-06:00 overlap once
// For regular continuation days: each day counted separately
function calcNightHours(startTime, endTime, isOvernightStart) {
  if (!startTime || !endTime || startTime === "?" || endTime === "?") return 0;
  var sh = startTime.split(":").map(Number);
  var eh = endTime.split(":").map(Number);
  var startMin = sh[0] * 60 + sh[1];
  var endMin = eh[0] * 60 + eh[1];
  var nightMins = 0;
  
  if (endMin >= startMin) {
    // Same day shift (e.g. 08:00-20:00)
    // Night = overlap with [0,360] or [1320,1440]
    // [0, 360] = 00:00-06:00
    nightMins += Math.max(0, Math.min(endMin, 360) - Math.max(startMin, 0));
    // [1320, 1440] = 22:00-24:00
    nightMins += Math.max(0, Math.min(endMin, 1440) - Math.max(startMin, 1320));
  } else {
    // Crosses midnight (e.g. 20:58-07:16)
    // Day 1: startMin to 1440
    // Night portion day 1: [1320,1440] overlap
    nightMins += Math.max(0, 1440 - Math.max(startMin, 1320));
    // Day 2: 0 to endMin
    // Night portion day 2: [0,360] overlap
    nightMins += Math.max(0, Math.min(endMin, 360));
  }
  return parseFloat((nightMins / 60).toFixed(2));
}

// Calculate night hours for a continuation day (prevDayOvernight, different tour)
// Uses the real startTime and endTime from PDF — it's a regular same-day shift
function calcNightHoursContinuation(startTime, endTime) {
  if (!startTime || !endTime || startTime === "?" || endTime === "?") return 0;
  var sh = startTime.split(":").map(Number);
  var eh = endTime.split(":").map(Number);
  var startMin = sh[0] * 60 + sh[1];
  var endMin = eh[0] * 60 + eh[1];
  var nightMins = 0;
  // Same day shift (continuation always starts and ends same day, e.g. 05:33-10:52)
  // Night = overlap with [0,360] (00:00-06:00) or [1320,1440] (22:00-24:00)
  nightMins += Math.max(0, Math.min(endMin, 360) - Math.max(startMin, 0));
  nightMins += Math.max(0, Math.min(endMin, 1440) - Math.max(startMin, 1320));
  return parseFloat((nightMins / 60).toFixed(2));
}

          .mob-cell-hrs{font-size:8px!important}
          .mob-cell-day{font-size:15px!important}
          .mob-cell-icon{font-size:8px!important}
          .mob-cell-label{font-size:9px!important}
        }
        @media(max-width:700px){
          .dc{min-height:70px;padding:6px 4px;border-radius:6px}
          .dc:hover{transform:none}
          .sc{padding:10px 12px;min-width:auto!important}
          .btn-ghost{padding:6px 10px;font-size:10px}
          .mob-edit-grid{grid-template-columns:1fr!important}
        }
      `}</style>

      {/* Header */}
      <div style={{ borderBottom: "1px solid #1c1f2b", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 3, flexShrink: 0 }}>
            {[1, .65, .35].map(function(o, i) { return <div key={i} style={{ width: 22, height: 3, background: "#f59e0b", borderRadius: 2, opacity: o }} />; })}
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 18, letterSpacing: 3, color: "#f59e0b" }}>DARBA KALENDĀRS</div>
            <div style={{ fontSize: 8, color: "#4a4d5a", letterSpacing: 2 }}>VILCIENA KONDUKTORS</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          {step === STEPS.CALENDAR && <button className="btn-ghost" onClick={function() { setEditSchedule({}); setStep(STEPS.EDIT); }}>✏ GRAFIKS</button>}
          {Object.keys(allCalData).length > 0 && step !== STEPS.CALENDAR && <button className="btn-ghost" onClick={function() { setStep(STEPS.CALENDAR); setSelectedDay(null); }}>← KALENDĀRS</button>}
          {step === STEPS.CALENDAR && <button className="btn-ghost" onClick={goToNewMonth}>+ JAUNS MĒNESIS</button>}
          <button className="btn-ghost" onClick={function() { setShowSettings(!showSettings); }} style={{ fontSize: 14, padding: "6px 10px" }}>⚙</button>
        </div>
      </div>

      {/* Settings panel */}
      {showSettings && (
        <div style={{ maxWidth: 1000, margin: "0 auto", padding: "12px 10px 0" }}>
          <div style={{ background: "#161820", border: "1px solid #2a2d3a", borderRadius: 10, padding: "16px 20px", marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 18, color: "#f59e0b", letterSpacing: 2 }}>IESTATĪJUMI</div>
              <button className="btn-ghost" onClick={function() { setShowSettings(false); }} style={{ padding: "4px 10px", fontSize: 12 }}>✕</button>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 2, marginBottom: 6 }}>GEMINI API ATSLĒGA</div>
              <div style={{ fontSize: 10, color: "#6b7280", marginBottom: 8, lineHeight: 1.6 }}>
                Vajadzīga PDF nolasīšanai ja Claude API nav pieejams. Iegūsti bezmaksas: <span style={{ color: "#93c5fd" }}>aistudio.google.com → Get API key</span>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input
                  type="password"
                  value={geminiKey}
                  onChange={function(e) { setGeminiKey(e.target.value); }}
                  placeholder="AIzaSy..."
                  style={{ flex: 1, background: "#0f1117", border: "1px solid #2a2d3a", color: "#e8eaf0", padding: "8px 12px", borderRadius: 6, fontFamily: "'DM Mono',monospace", fontSize: 12, outline: "none" }}
                />
                <button className="btn" onClick={function() { saveGeminiKey(geminiKey); setShowSettings(false); }} style={{ padding: "8px 16px", fontSize: 12 }}>
                  SAGLABĀT
                </button>
              </div>
              {geminiKey && <div style={{ marginTop: 6, fontSize: 10, color: "#4ade80" }}>✓ Atslēga saglabāta</div>}
              {geminiKey && (
                <div style={{ marginTop: 8 }}>
                  <button className="btn-sm" onClick={function() {
                    setApiTestResult("⏳ Testē...");
                    (async function() {
                      try {
                        var res = await fetchWithTimeout(GEMINI_API_URL + "?key=" + geminiKey, {
                          method: "POST",
                          headers: { "Content-Type": "application/json" },
                          body: JSON.stringify({ contents: [{ parts: [{ text: "Respond with just: OK" }] }] }),
                        }, 15000);
                        var data = await res.json();
                        if (data.error) {
                          setApiTestResult("❌ " + (data.error.message || JSON.stringify(data.error)));
                        } else if (data.candidates && data.candidates[0]) {
                          setApiTestResult("✅ Gemini strādā! Atbilde: " + data.candidates[0].content.parts[0].text.slice(0, 50));
                        } else {
                          setApiTestResult("❌ Neparedzēta atbilde: " + JSON.stringify(data).slice(0, 100));
                        }
                      } catch (err) {
                        setApiTestResult("❌ " + err.message);
                      }
                    })();
                  }} style={{ fontSize: 10 }}>🔧 TESTĒT API</button>
                  {apiTestResult && <div style={{ marginTop: 6, fontSize: 10, color: apiTestResult.startsWith("✅") ? "#4ade80" : apiTestResult.startsWith("⏳") ? "#f59e0b" : "#f87171", lineHeight: 1.5 }}>{apiTestResult}</div>}
                </div>
              )}
            </div>
            <div style={{ borderTop: "1px solid #1c1f2b", paddingTop: 10, fontSize: 10, color: "#4a4d5a", lineHeight: 1.7 }}>

              <div>1. <span style={{ color: "#93c5fd" }}>Claude API</span> — automātiski čata side panelī</div>
              <div>2. <span style={{ color: "#4ade80" }}>Gemini API</span> — ja Claude nav pieejams (publicētā versija)</div>
              {lastProvider && <div style={{ marginTop: 6, color: "#f59e0b" }}>Pēdējais izmantotais: <span style={{ color: lastProvider === "Claude" ? "#93c5fd" : "#4ade80" }}>{lastProvider}</span></div>}
            </div>
          </div>
        </div>
      )}

      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "16px 10px" }}>

        {/* STEP 1: PASTE */}
        {step === STEPS.PASTE && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 40, letterSpacing: 5, lineHeight: 1 }}>
                IELĪMĒ GRAFIKU<br /><span style={{ color: "#f59e0b" }}>NO GEMINI</span>
              </div>
              <div style={{ fontSize: 11, color: "#4a4d5a", marginTop: 10, letterSpacing: 1 }}>PAPRASI GEMINI PĀRVĒRST BILDI TEKSTĀ, TIEM IELĪMĒ ŠEIT</div>
            </div>

            <div style={{ background: "#161820", border: "1px solid #2a2d3a", borderRadius: 10, padding: "14px 18px", marginBottom: 20 }}>
              <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 2, marginBottom: 8 }}>GEMINI PROMPT (nokopē un izmanto)</div>
              <div style={{ background: "#0f1117", borderRadius: 6, padding: "10px 14px", fontSize: 11, color: "#9ca3af", lineHeight: 1.7, fontFamily: "monospace" }}>
                Lūdzu nolasi šo darba grafika bildi un izvadi tabulu šādā formātā:<br />
                1: /70174<br />
                2: b<br />
                3: 7117<br />
                ...<br />
                Kur "/" pirms numura nozīmē naktsmainis (darbs sākās iepriekšējā dienā), "b" = brīvdiena, "D" = dežūra (16h), "D10" = dežūra 10h.
              </div>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: "#f59e0b", letterSpacing: 2, marginBottom: 8 }}>IELĪMĒ GEMINI ATBILDI:</div>
              <textarea
                rows={14}
                placeholder={"1: /70174\n2: b\n3: 7117\n4: 7628\n..."}
                value={geminiText}
                onChange={function(e) { setGeminiText(e.target.value); }}
              />
            </div>

            {parsed && Object.keys(parsed.schedule).length > 0 && (
              <div style={{ background: "#1a2a1a", border: "1px solid #2a5c35", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#4ade80" }}>
                ✓ Atpazītas {Object.keys(parsed.schedule).length} dienas
                {parsed.month && <span> · {MONTH_LV[parsed.month]}</span>}
                {parsed.year && <span> {parsed.year}</span>}
              </div>
            )}

            <button className="btn" disabled={!parsed}
              onClick={function() { setStep(STEPS.EDIT); }}
              style={{ width: "100%", fontSize: 15 }}>
              TĀLĀK →
            </button>
          </div>
        )}

        {/* STEP 2: EDIT */}
        {step === STEPS.EDIT && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 32, letterSpacing: 4 }}>PĀRBAUDI UN REDIĢĒ</div>
                <div style={{ fontSize: 11, color: "#4a4d5a", letterSpacing: 1 }}>KLIKŠĶINI UZ TŪRES LAI LABOTU · PIEVIENO PDF FAILUS</div>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: "#6b7280" }}>Mēnesis:</span>
                  <select value={metaMonth} onChange={function(e) { setMetaMonth(e.target.value); }}>
                    <option value="">—</option>
                    {MONTH_LV.slice(1).map(function(m, i) { return <option key={i+1} value={i+1}>{m}</option>; })}
                  </select>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: "#6b7280" }}>Gads:</span>
                  <input type="number" value={metaYear} onChange={function(e) { var v = parseInt(e.target.value); if (v && v > 2000) setMetaYear(v); }} style={{ width: 80 }} />
                </div>
              </div>
            </div>

            <div className="mob-edit-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
              {/* Schedule table */}
              <div style={{ background: "#161820", border: "1px solid #2a2d3a", borderRadius: 10, padding: "14px" }}>
                <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 2, marginBottom: 12 }}>GRAFIKS — KLIKŠĶINI LAI LABOTU</div>
                <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 80px auto", gap: 6, marginBottom: 8, padding: "0 8px" }}>
                  {["D","TŪRE","",""].map(function(hh, i) { return <div key={i} style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1 }}>{hh}</div>; })}
                </div>
                <div style={{ maxHeight: 460, overflowY: "auto" }}>
                  {Array.from({ length: daysInMonth() }).map(function(_, i) {
                    var d = i + 1;
                    var e = editSchedule[d] || { tour: "b", prevNight: false };
                    var dow = getDow(d);
                    var isWE = dow === 6 || dow === 7;
                    var isEditing = editingDay === d;
                    var isOff = !e.tour || e.tour === "b";
                    return (
                      <div key={d} className={"erow" + (isWE ? " wknd" : "")}>
                        <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 16, color: isWE ? "#f59e0b" : "#6b7280", textAlign: "center" }}>{d}</div>
                        {isEditing ? (
                          <input
                            autoFocus
                            className="edit-inp"
                            value={editVal}
                            onChange={function(ev) { setEditVal(ev.target.value); }}
                            onKeyDown={function(ev) { if (ev.key === "Enter") saveEdit(d); if (ev.key === "Escape") setEditingDay(null); }}
                            placeholder="/70174 vai b"

                        ) : (
                          <div
                            onClick={function() { setEditingDay(d); setEditVal(e.prevNight ? "/" + e.tour : e.tour); }}
                            style={{ cursor: "pointer", fontSize: 11, color: isOff ? "#3a3d4a" : "#93c5fd", padding: "2px 0" }}
                          >
                            {e.prevNight && <span style={{ color: "#4ade80", marginRight: 4 }}>↩/</span>}
                            {e.tour || "b"}
                          </div>
                        )}
                        <div style={{ fontSize: 9 }}>
                          {isOff ? (
                            <span className="tg tag-b">BRĪVS</span>

                          ) : e.prevNight ? (
                            <span className="tg tag-p">↩ NAKTS</span>
                          ) : (
                            <span className="tg tag-w">DARBS</span>
                          )}
                        </div>
                        <div style={{ display: "flex", gap: 4 }}>
                          {isEditing ? (
                            <>
                              <button className="btn-sm" style={{ fontSize: 10, padding: "3px 8px" }} onClick={function() { saveEdit(d); }}>✓</button>
                              <button className="btn-red" style={{ padding: "3px 8px" }} onClick={function() { setEditingDay(null); }}>✗</button>
                            </>
                          ) : (
                            <button className="btn-sm" style={{ fontSize: 9, padding: "3px 8px" }}
                              onClick={function() { setEditingDay(d); setEditVal(e.prevNight ? "/" + e.tour : e.tour || "b"); }}>
                              ✏
                            </button>

                      </div>

                </div>
                <div style={{ marginTop: 10, fontSize: 9, color: "#3a3d4a", lineHeight: 1.7 }}>
                  Ievades formāts: <span style={{ color: "#f59e0b" }}>70157</span> = tūre · <span style={{ color: "#4ade80" }}>/70174</span> = naktsmainis · <span style={{ color: "#06b6d4" }}>D</span> = dežūra 16h · <span style={{ color: "#06b6d4" }}>D10</span> = dežūra 10h · <span style={{ color: "#4a4d5a" }}>b</span> = brīvdiena
                </div>
              </div>

              {/* PDF upload */}
              <div>
                <div style={{ background: "#161820", border: "1px solid #2a2d3a", borderRadius: 10, padding: "14px", marginBottom: 16 }}>
                  <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 2, marginBottom: 12 }}>TŪRU PDF FAILI (KK + VVP)</div>

                  {calData && calData.pdfTours && Object.keys(calData.pdfTours).length > 0 && pdfs.length === 0 && (
                    <div style={{ background: "#1a2a1a", border: "1px solid #2a5c35", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 11, color: "#4ade80" }}>
                      ✓ Jau ielādētas {Object.keys(calData.pdfTours).length} tūres no iepriekšējiem PDF. Pievieno jaunus tikai ja vajag papildus tūres.
                    </div>
                  )}

                  <div className="dz" onClick={function() { pdfInputRef.current.click(); }} onDrop={onPdfDrop} onDragOver={function(e) { e.preventDefault(); }}
                    style={{ minHeight: 100, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <input ref={pdfInputRef} type="file" accept="application/pdf" multiple hidden onChange={onPdfDrop} />
                    {pdfs.length === 0 ? (
                      <>
                        <div style={{ fontSize: 24 }}>📋</div>
                        <div style={{ fontSize: 11, color: "#4a4d5a" }}>{calData && calData.pdfTours ? "Pievieno papildus PDF (pēc izvēles)" : "Ievelc vai klikšķini"}</div>
                      </>
                    ) : (
                      <div style={{ width: "100%" }}>
                        {pdfs.map(function(f, i) {
                          return (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: "1px solid #1c1f2b", fontSize: 11 }}>
                              <span style={{ color: "#10b981", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "85%" }}>✓ {f.name}</span>
                              <button onClick={function(e) { e.stopPropagation(); removePdf(i); }} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 15 }}>×</button>
                            </div>
                          );
                        })}
                        <div style={{ marginTop: 8, fontSize: 10, color: "#4a4d5a", textAlign: "center" }}>+ klikšķini lai pievienotu vēl</div>
                      </div>
                    )}
                  </div>
                </div>

                <div style={{ background: "#1a1505", border: "1px solid #3a2a0544", borderRadius: 8, padding: "10px 14px", fontSize: 10, color: "#a37a20", lineHeight: 1.7, marginBottom: 16 }}>
                  {calData && calData.pdfTours ? "PDF dati jau saglabāti. \"IZVEIDOT KALENDĀRU\" pārbūvēs visu no jauna." : "Pievienojiet visus KK un VVP PDF failus lai nolasītu tūru laikus."}
                </div>

                {error && <div style={{ background: "#2a1515", border: "1px solid #ef4444", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: "#ef4444" }}>⚠ {error}</div>}

                <button className="btn" onClick={buildCalendar} disabled={(!hasPreviousPdfData && pdfs.length === 0) || !metaMonth}
                  style={{ width: "100%", fontSize: 15 }}>
                  IZVEIDOT KALENDĀRU →
                </button>
                {Object.keys(allCalData).length > 0 && (
                  <button className="btn-ghost" onClick={function() { setStep(STEPS.CALENDAR); setSelectedDay(null); }}
                    style={{ width: "100%", marginTop: 8, fontSize: 13, padding: "10px 16px" }}>
                    ← ATPAKAĻ UZ KALENDĀRU (bez pārbūves)
                  </button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* LOADING */}
        {step === STEPS.LOADING && (
          <div style={{ textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, letterSpacing: 6, color: "#f59e0b", marginBottom: 24 }}>APSTRĀDĀ...</div>
            <div style={{ fontSize: 13, color: "#9ca3af", marginBottom: 20 }}>{loadStep}</div>
            <div className="pb" style={{ maxWidth: 400, margin: "0 auto 8px" }}>
              <div className="pf" style={{ width: loadPct + "%" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 30 }}>
              {[0,1,2].map(function(i) { return <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: "#f59e0b", animation: "pulse 1.2s infinite " + (i*0.2) + "s" }} />; })}
            </div>
            <button className="btn-ghost" onClick={function() { setStep(STEPS.EDIT); setLoadStep(""); setLoadPct(0); }}
              style={{ marginTop: 30, fontSize: 12 }}>ATCELT</button>
          </div>
        )}

        {/* CALENDAR */}
        {step === STEPS.CALENDAR && calData && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
                <button onClick={function() { navigateMonth(-1); }} disabled={!canGoPrev}
                  style={{ background: "none", border: "none", fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: canGoPrev ? "#f59e0b" : "#1c1f2b", cursor: canGoPrev ? "pointer" : "default", padding: "0 8px", lineHeight: 1 }}>◀</button>

                  <div className="mob-year" style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 24, color: "#2a2d3a", letterSpacing: 6 }}>{calData.year}</div>
                </div>
                <button onClick={function() { navigateMonth(1); }} disabled={!canGoNext}
                  style={{ background: "none", border: "none", fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: canGoNext ? "#f59e0b" : "#1c1f2b", cursor: canGoNext ? "pointer" : "default", padding: "0 8px", lineHeight: 1 }}>▶</button>
              </div>
              {monthKeys.length > 1 && (
                <div style={{ fontSize: 9, color: "#4a4d5a", marginTop: 4 }}>
                  {monthKeys.map(function(mk) {
                    var parts = mk.split("-"); var m = parseInt(parts[1]);
                    return <span key={mk} style={{ margin: "0 4px", color: mk === activeKey ? "#f59e0b" : "#2a2d3a", cursor: "pointer" }}
                      onClick={function() { setActiveKey(mk); setSelectedDay(null); setEditDayTour(""); }}>●</span>;
                  })}
                </div>
              )}
            </div>

            {/* Stats */}
            <div className="mob-stats" style={{ display: "flex", gap: 8, marginBottom: 16, justifyContent: "center", flexWrap: "wrap" }}>
              {[
                { l: "DARBA DIENAS", v: totalWork, c: "#3b82f6" },
                { l: "BRĪVDIENAS", v: totalOff, c: "#2dd4bf" },
                { l: "STUNDAS", v: totalHrs, c: "#f59e0b", click: true },
                notFound > 0 ? { l: "NAV ATRASTS", v: notFound, c: "#ef4444" } : null,

                return (
                  <div key={s.l} className="sc" style={{ textAlign: "center", minWidth: 80, cursor: s.click ? "pointer" : "default", border: s.click && showBreakdown ? "1px solid #f59e0b" : undefined }}
                    onClick={s.click ? function() { setShowBreakdown(!showBreakdown); } : undefined}>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 28, color: s.c }}>{s.v}</div>
                    <div style={{ fontSize: 8, color: "#4a4d5a", letterSpacing: 1 }}>{s.l}{s.click ? " ▾" : ""}</div>
                  </div>
                );
              })}
            </div>

            {/* Hours breakdown */}
            {showBreakdown && breakdown && (
              <div style={{ background: "#161820", border: "1px solid #f59e0b44", borderRadius: 10, padding: "16px 20px", marginBottom: 16 }}>
                <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 16, color: "#f59e0b", letterSpacing: 2, marginBottom: 12 }}>STUNDU SADALĪJUMS</div>
                <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: "#f59e0b" }}>{totalHrs}</div>
                    <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1 }}>KOPĀ</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: "#8b5cf6" }}>{breakdown.nightH}</div>
                    <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1 }}>NAKTS (22-06)</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: "#ef4444" }}>{breakdown.holidayH}</div>
                    <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1 }}>SVĒTKU</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: "#06b6d4" }}>{breakdown.dutyH}</div>
                    <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1 }}>DEŽŪRAS</div>
                  </div>
                </div>
                {breakdown.dutyDays.length > 0 && (
                  <div style={{ marginTop: 10, fontSize: 10, color: "#06b6d4" }}>
                    Dežūras: {breakdown.dutyDays.map(function(hd) { return hd + "." + MONTH_LV[calData.month].toLowerCase().slice(0,3); }).join(", ")} ({breakdown.dutyDays.length} dienas × 12h)
                  </div>
                )}
                {breakdown.holidayDays.length > 0 && (
                  <div style={{ marginTop: 10, fontSize: 10, color: "#6b7280" }}>
                    Svētku dienas šajā mēnesī: {breakdown.holidayDays.map(function(hd) { return hd + "." + MONTH_LV[calData.month].toLowerCase().slice(0,3); }).join(", ")}
                  </div>
                )}
                {breakdown.holidayDays.length === 0 && (
                  <div style={{ marginTop: 10, fontSize: 10, color: "#4a4d5a" }}>Šajā mēnesī nav svētku dienu</div>
                )}
              </div>
            )}

            {/* Legend */}
            <div className="mob-legend" style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap", fontSize: 9, color: "#6b7280" }}>
              {[
                { bg: "#131a2a", br: "#1e2d4a", l: "Darbs" },
                { bg: "#1e3045", br: "#2e5a7c", l: "→ Turpinās" },
                { bg: "#1f1535", br: "#3b2a5c", l: "🌙 Naktsmainis" },
                { bg: "#1f2a20", br: "#2a5c35", l: "↩ Nakts beigas" },
                { bg: "#2a1215", br: "#4a1a1e", l: "Brīvdiena" },
                { bg: "#2a1a10", br: "#5c3a1a", l: "Nav atrasta" },
              ].map(function(item) {
                return (
                  <div key={item.l} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 11, height: 11, borderRadius: 3, background: item.bg, border: "1px solid " + item.br, flexShrink: 0 }} />
                    {item.l}
                  </div>
                );
              })}
            </div>

            {/* DOW header */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, marginBottom: 3 }}>
              {DAY_LV.map(function(d) { return <div key={d} style={{ textAlign: "center", fontSize: 10, color: d === "Se" || d === "Sv" ? "#f59e0b" : "#4a4d5a", padding: "3px 0", letterSpacing: 1 }}>{d}</div>; })}
            </div>

            {/* Grid */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
              {Array.from({ length: firstDow - 1 }).map(function(_, i) { return <div key={"e" + i} />; })}

              {Array.from({ length: calData.daysInMonth }).map(function(_, i) {
                var d = i + 1;
                var info = calData.calendar[d];
                var isOff = !info || info.type === "off";
                var isPrev = info && info.prevDayOvernight;
                var isNight = !isPrev && info && info.overnight;
                var isNF = info && info.notFound;
                var isSel = selectedDay === d;
                var w = new Date(calData.year, calData.month - 1, d).getDay();
                var isWE = w === 0 || w === 6;
                // Check if this day's tour continues to next day
                var nextDayInfo = d < calData.daysInMonth ? calData.calendar[d + 1] : null;
                var continuesNext = !isOff && !isPrev && !isNight && nextDayInfo && nextDayInfo.prevDayOvernight;
                // Overnight start = purple, continuation = green, continues next = light blue, regular work = blue, off = red
                var cls = isOff ? "do" : isNF ? "dnf" : isPrev ? "dp" : isNight ? "dn" : continuesNext ? "dc2" : "dw";
                // Moon only on true overnight: start day with overnight=true, or continuation where prev day has overnight=true
                var prevDayInfo = d > 1 ? calData.calendar[d - 1] : null;
                var showMoon = isNight || (isPrev && prevDayInfo && prevDayInfo.overnight);

                return (
                  <div key={d} className={"dc " + cls + (isSel ? " sel" : "")} onClick={function() { setSelectedDay(isSel ? null : d); setEditDayTour(""); setEditTimeStart(""); setEditTimeEnd(""); }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 2 }}>
                      <span className="mob-cell-day" style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 17, lineHeight: 1, color: isOff ? (isWE ? "#f87171" : "#fca5a5") : isWE ? "#fbbf24" : "#e8eaf0" }}>{d}</span>
                      {!isOff && <span className="mob-cell-icon" style={{ fontSize: 10 }}>{isPrev ? (showMoon ? "🌙↩" : "↩") : showMoon ? "🌙" : continuesNext ? "→" : ""}{isNF ? "⚠" : ""}</span>}
                    </div>
                    {isOff ? (
                      <div className="mob-cell-label" style={{ fontSize: 10, color: "#f87171", letterSpacing: 1, marginTop: 6 }}>BRĪVS</div>
                    ) : (
                      <>
                        <div className="mob-cell-tour" style={{ fontSize: 9, color: "#f59e0b88", marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{info.tour}</div>
                        {info.startTime !== "?" ? (
                          isPrev ? (
                            <>
                              <div className="mob-cell-tour" style={{ fontSize: 9, color: "#86efac" }}>beidzas:</div>
                              <div className="mob-cell-time" style={{ fontSize: 11, color: "#4ade80", fontWeight: 500 }}>{info.endTime}</div>
                            </>
                          ) : (
                            <>
                              <div className="mob-cell-time" style={{ fontSize: 11, color: "#93c5fd", fontWeight: 500 }}>{info.startTime}</div>
                              <div className="mob-cell-arrow" style={{ fontSize: 9, color: "#6b7280" }}>{info.endTime}</div>
                            </>
                          )
                        ) : <div className="mob-cell-tour" style={{ fontSize: 9, color: "#5c3a1a" }}>nav PDF</div>}
                        {info.hours && <div className="mob-cell-hrs" style={{ fontSize: 8, color: "#3a3d4a", textAlign: "right" }}>{info.hours}h</div>}
                      </>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Day detail */}
            {selectedDay && selDay && (
              <div style={{ marginTop: 18, background: "#161820", border: "1px solid " + (selDay.type === "off" ? "#3a1a1a" : selDay.prevDayOvernight ? "#2a5c35" : selDay.overnight ? "#3b2a5c" : "#2a3a5c"), borderRadius: 12, padding: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 50, color: "#f59e0b", lineHeight: 1 }}>{selectedDay}</div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 16, letterSpacing: 3 }}>{MONTH_LV[calData.month].toUpperCase()}</div>
                    <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 2, marginTop: 2 }}>
                      {DOW_LV[(function() { var ww = new Date(calData.year, calData.month-1, selectedDay).getDay(); return ww===0?7:ww; })()]}
                    </div>
                  </div>
                  {selDay.type !== "off" && (
                    <div style={{ flex: 1, display: "flex", gap: 22, flexWrap: "wrap" }}>
                      {selDay.prevDayOvernight ? (
                        <div>
                          <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>DARBS SĀKĀS IEPRIEKŠĒJĀ DIENĀ</div>
                          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 16, color: "#86efac", letterSpacing: 2 }}>BEIDZAS ŠODIEN</div>
                          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#4ade80" }}>{selDay.endTime}</div>
                          {!selDay.hours && <div style={{ fontSize: 9, color: "#4a4d5a", marginTop: 4 }}>Stundas ieskaitītas iepriekšējā dienā</div>}
                        </div>
                      ) : selDay.startTime === "?" ? (
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 11, color: "#f59e0b", letterSpacing: 1, marginBottom: 10 }}>⚠ IEVADI DARBA LAIKUS:</div>
                          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                            <div>
                              <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>SĀKUMS</div>
                              <input type="text" inputMode="numeric" value={editTimeStart} onChange={function(e) { setEditTimeStart(e.target.value); }}
                                onBlur={function() { if (editTimeStart) setEditTimeStart(autoFormatTime(editTimeStart)); }}
                                placeholder="1408" style={{ background: "#0f1117", border: "2px solid #f59e0b44", color: "#93c5fd", padding: "8px", borderRadius: 6, fontFamily: "'Bebas Neue',sans-serif", fontSize: 32, outline: "none", width: 100, textAlign: "center" }} />
                            </div>
                            <div>
                              <div style={{ fontSize: 9, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>BEIGAS</div>
                              <input type="text" inputMode="numeric" value={editTimeEnd} onChange={function(e) { setEditTimeEnd(e.target.value); }}
                                onBlur={function() { if (editTimeEnd) setEditTimeEnd(autoFormatTime(editTimeEnd)); }}
                                placeholder="2306" style={{ background: "#0f1117", border: "2px solid #f59e0b44", color: "#10b981", padding: "8px", borderRadius: 6, fontFamily: "'Bebas Neue',sans-serif", fontSize: 32, outline: "none", width: 100, textAlign: "center" }} />
                            </div>
                            <button className="btn" disabled={!editTimeStart || !editTimeEnd}
                              onClick={function() { updateDayTimes(selectedDay, editTimeStart, editTimeEnd); }}
                              style={{ padding: "10px 20px", fontSize: 14, alignSelf: "flex-end" }}>SAGLABĀT</button>
                          </div>
                          <div style={{ fontSize: 9, color: "#4a4d5a", marginTop: 6 }}>Formāts: 14:08 · Stundas aprēķinās automātiski</div>
                        </div>
                      ) : (
                        <>
                          <div>
                            <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>SĀKUMS</div>
                            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#3b82f6" }}>{selDay.startTime}</div>
                          </div>
                          <div>
                            <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>BEIGAS</div>
                            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#10b981" }}>{selDay.endTime}</div>
                          </div>
                          {selDay.hours && (
                            <div>
                              <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 1, marginBottom: 4 }}>STUNDAS</div>
                              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#f59e0b" }}>{selDay.hours}</div>
                            </div>
                          )}
                          {selDay.dutyBeforeH && (
                            <div>
                              <div style={{ fontSize: 10, color: "#06b6d4", letterSpacing: 1, marginBottom: 4 }}>DEŽŪRA</div>
                              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#06b6d4" }}>{selDay.dutyBeforeH}h</div>
                              <div style={{ fontSize: 8, color: "#4a4d5a" }}>05:00–{selDay.dutyBeforeEnd}</div>
                            </div>
                          )}
                          {selDay.dutyHours && !selDay.isDuty && !selDay.dutyBeforeH && (
                            <div>
                              <div style={{ fontSize: 10, color: "#06b6d4", letterSpacing: 1, marginBottom: 4 }}>DEŽŪRA</div>
                              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 38, color: "#06b6d4" }}>{selDay.dutyHours}h</div>
                              <div style={{ fontSize: 8, color: "#4a4d5a" }}>05:00–{selDay.startTime}</div>
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  )}
                  {selDay.type === "off" && <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 26, color: "#f87171", letterSpacing: 3 }}>BRĪVDIENA</div>}
                </div>

                {selDay.type !== "off" && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #1c1f2b", display: "flex", gap: 7, flexWrap: "wrap" }}>
                    <span className="tg" style={{ background: "#1c2335", color: "#60a5fa", border: "1px solid #2a3a5c" }}>TŪRE: {selDay.tour}</span>
                    {selDay.overnight && <span className="tg" style={{ background: "#1f1535", color: "#a78bfa", border: "1px solid #3b2a5c" }}>🌙 NAKTSMAINIS</span>}
                    {selDay.prevDayOvernight && <span className="tg" style={{ background: "#1f2a20", color: "#4ade80", border: "1px solid #2a5c35" }}>↩ IEPRIEKŠĒJĀ NAKTS BEIGAS</span>}
                    {selDay.notFound && <span className="tg" style={{ background: "#2a1a10", color: "#f59e0b", border: "1px solid #5c3a1a" }}>⚠ NAV PDF</span>}
                    {selDay.dutyBeforeH && <span className="tg" style={{ background: "#0a2a2a", color: "#06b6d4", border: "1px solid #155e75" }}>DEŽŪRA {selDay.dutyBeforeH}h (05:00–{selDay.dutyBeforeEnd})</span>}
                    {selDay.dutyHours && !selDay.isDuty && !selDay.dutyBeforeH && <span className="tg" style={{ background: "#0a2a2a", color: "#06b6d4", border: "1px solid #155e75" }}>+ DEŽŪRA {selDay.dutyHours}h</span>}
                  </div>
                )}

                {/* Inline tour edit */}
                <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid #1c1f2b" }}>
                  <div style={{ fontSize: 10, color: "#4a4d5a", letterSpacing: 2, marginBottom: 8 }}>MAINĪT TŪRI:</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input
                      type="text"
                      value={editDayTour}
                      onChange={function(e) { setEditDayTour(e.target.value); }}
                      onKeyDown={function(e) { if (e.key === "Enter" && editDayTour.trim()) updateDayTour(selectedDay, editDayTour); }}
                      placeholder={selDay.type === "off" ? "b (brīvdiena)" : selDay.tour || "tūres nr."}
                      style={{ flex: 1, background: "#0f1117", border: "1px solid #2a2d3a", color: "#e8eaf0", padding: "8px 12px", borderRadius: 6, fontFamily: "'DM Mono',monospace", fontSize: 13, outline: "none" }}
                    />
                    <button
                      className="btn"
                      disabled={!editDayTour.trim()}
                      onClick={function() { updateDayTour(selectedDay, editDayTour); }}
                      style={{ padding: "8px 20px", fontSize: 13 }}
                    >ATJAUNOT</button>
                  </div>
                  <div style={{ fontSize: 10, color: "#3a3d4a", marginTop: 6 }}>
                    Piemēri: <span style={{ color: "#6b7280" }}>70259</span> = darbs · <span style={{ color: "#6b7280" }}>/70174</span> = naktsmainis · <span style={{ color: "#06b6d4" }}>D</span> = dežūra 16h · <span style={{ color: "#06b6d4" }}>D10</span> = 10h · <span style={{ color: "#6b7280" }}>b</span> = brīvdiena
                  </div>
                </div>

                {/* Inline time edit */}
                {selDay.type !== "off" && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #1c1f2b" }}>
                    <div style={{ fontSize: 10, color: selDay.startTime === "?" ? "#f59e0b" : "#4a4d5a", letterSpacing: 2, marginBottom: 8 }}>
                      {selDay.startTime === "?" ? "⚠ IEVADI LAIKUS MANUĀLI:" : "MAINĪT LAIKUS:"}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        <span style={{ fontSize: 10, color: "#6b7280" }}>No:</span>
                        <input
                          type="text"
                          inputMode="numeric"
                          value={editTimeStart}
                          onChange={function(e) { setEditTimeStart(e.target.value); }}
                          onBlur={function() { if (editTimeStart) setEditTimeStart(autoFormatTime(editTimeStart)); }}
                          placeholder={selDay.startTime !== "?" ? selDay.startTime : "1408"}
                          style={{ background: "#0f1117", border: "1px solid " + (selDay.startTime === "?" ? "#f59e0b44" : "#2a2d3a"), color: "#93c5fd", padding: "8px 10px", borderRadius: 6, fontFamily: "'DM Mono',monospace", fontSize: 15, outline: "none", width: 80, textAlign: "center" }}
                        />
                      </div>
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        <span style={{ fontSize: 10, color: "#6b7280" }}>Līdz:</span>
                        <input
                          type="text"
                          inputMode="numeric"
                          value={editTimeEnd}
                          onChange={function(e) { setEditTimeEnd(e.target.value); }}
                          onBlur={function() { if (editTimeEnd) setEditTimeEnd(autoFormatTime(editTimeEnd)); }}
                          placeholder={selDay.endTime !== "?" ? selDay.endTime : "2306"}
                          style={{ background: "#0f1117", border: "1px solid " + (selDay.endTime === "?" ? "#f59e0b44" : "#2a2d3a"), color: "#10b981", padding: "8px 10px", borderRadius: 6, fontFamily: "'DM Mono',monospace", fontSize: 15, outline: "none", width: 80, textAlign: "center" }}
                        />
                      </div>
                      <button
                        className="btn"
                        disabled={!editTimeStart && !editTimeEnd}
                        onClick={function() { updateDayTimes(selectedDay, editTimeStart || selDay.startTime, editTimeEnd || selDay.endTime); }}
                        style={{ padding: "8px 16px", fontSize: 13 }}
                      >✓</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Add more PDFs section */}
            <div style={{ marginTop: 24, background: "#161820", border: "1px solid #2a2d3a", borderRadius: 10, padding: "14px 18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 2 }}>PAPILDUS PDF FAILI</div>
                  <div style={{ fontSize: 10, color: "#4a4d5a", marginTop: 2 }}>
                    {notFound > 0 ? notFound + " tūre" + (notFound > 1 ? "s" : "") + " nav atrastas" : "Visas tūres atrastas"}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="file" accept=".pdf" multiple ref={addPdfInputRef} style={{ display: "none" }}
                    onChange={function(e) { var files = Array.from(e.target.files).filter(function(f) { return f.type === "application/pdf"; }); if (files.length) processAdditionalPdfs(files); e.target.value = ""; }} />
                  <button className="btn-sm" onClick={function() { if (addPdfInputRef.current) addPdfInputRef.current.click(); }} disabled={editDayUpdating}>
                    {editDayUpdating ? "⏳ APSTRĀDĀ..." : "+ PIEVIENOT PDF"}
                  </button>
                </div>
              </div>
              {error && <div style={{ marginTop: 8, padding: "8px 12px", background: "#2a1515", border: "1px solid #5c2020", borderRadius: 6, fontSize: 11, color: "#f87171" }}>{error}</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
