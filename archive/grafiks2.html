<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Grafika Tūru Parsēšana</title>
  <!-- Iekļaujam PDF.js bibliotēku -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.13.216/pdf.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #resultTable { border-collapse: collapse; width: 100%; margin-top: 20px; }
    #resultTable th, #resultTable td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    #resultTable th { background-color: #f2f2f2; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Grafika Tūru Parsēšana</h1>
  <input type="file" id="fileInput" accept="application/pdf">
  <button onclick="processPDF()">Ielādēt un parsēt</button>
  <p id="status"></p>
  
  <table id="resultTable">
    <thead>
      <tr>
        <th>Datums</th>
        <th>Agrākais darba sākums</th>
        <th>Vēlākais darba beigu laiks</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  
  <script>
    // Mēneša nosaukumu pārveidošana uz mēneša numuru
    const monthMap = {
      "janvāris": "01", "janvārī": "01",
      "februāris": "02", "februārī": "02",
      "marts": "03",
      "aprīlis": "04", "aprīlī": "04",
      "maijs": "05", "maijā": "05",
      "jūnijs": "06", "jūnijā": "06",
      "jūlijs": "07", "jūlijā": "07",
      "augusts": "08", "augustā": "08",
      "septembris": "09", "septembrī": "09",
      "oktobris": "10", "oktobrī": "10",
      "novembris": "11", "novembrī": "11",
      "decembris": "12", "decembrī": "12"
    };

    async function processPDF() {
      const fileInput = document.getElementById('fileInput');
      const statusEl = document.getElementById('status');
      const resultTableBody = document.querySelector('#resultTable tbody');
      resultTableBody.innerHTML = '';
      
      if (!fileInput.files.length) {
        alert("Lūdzu, izvēlies PDF failu.");
        return;
      }
      
      const file = fileInput.files[0];
      const arrayBuffer = await file.arrayBuffer();
      
      statusEl.textContent = "Apstrāde notiek...";
      
      try {
        // Ielādē PDF dokumentu
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";
        
        // Iterējam caur visām lapām un apvienojam tekstu
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          // Apvieno visu tekstu vienā virknes formā – atdalot ar telpu
          const pageText = textContent.items.map(item => item.str).join(" ");
          fullText += pageText + "\n";
        }
        
        // Ja nav izveidojies saturs, izmanto alternatīvu dalīšanas metodi
        let lines = fullText.split(/\r?\n/);
        if (lines.length < 2) {
          lines = fullText.split(/\s{2,}/);
        }
        
        // Mēģinām atrast datuma informāciju no galvenes
        // Piemēram: 2025. gada "27." februārī
        let headerRegex = /(\d{4})\.\s*gada\s*["']?(\d{1,2})["']?\.\s*(\w+)/i;
        let headerMatch = fullText.match(headerRegex);
        let scheduleDate = "Nedefinēts";
        if (headerMatch) {
          let year = headerMatch[1];
          let day = headerMatch[2].padStart(2, '0');
          let monthName = headerMatch[3].toLowerCase();
          let month = monthMap[monthName] || "01";
          scheduleDate = `${year}-${month}-${day}`;
        }
        
        // Ja neskaita datuma no galvenes, varam izmantot noklusējumu vai mēģināt atrast datumu citur
        console.log("Atrasts datums:", scheduleDate);
        
        // Objektā saglabājam agrāko sākumu un vēlāko beigu laiku pa datumu
        let schedule = {};
        // Izmanto iegūto datumu kā atslēgu (var būt arī vairāki, ja dokumentā ir vairāki datumi)
        schedule[scheduleDate] = { start: null, end: null };
        
        // Iterējam caur katru rindu un meklējam rindas, kas sākas ar tūres numuru (skaitlis)
        lines.forEach(line => {
          line = line.trim();
          if (/^\d+/.test(line)) {
            // Meklē visas laika vērtības formātā HH:MM (vai HH:MM:SS)
            let times = line.match(/(\d{2}:\d{2}(?::\d{2})?)/g);
            if (times && times.length >= 4) {
              // Pieņemam, ka trešā laika vērtība ir darba sākums un ceturtā – darba beigas
              let startTime = times[2];
              let endTime = times[3];
              
              // Ja esošajam datumam nav vērtību, uzstādām
              if (!schedule[scheduleDate].start || startTime < schedule[scheduleDate].start) {
                schedule[scheduleDate].start = startTime;
              }
              if (!schedule[scheduleDate].end || endTime > schedule[scheduleDate].end) {
                schedule[scheduleDate].end = endTime;
              }
            }
          }
        });
        
        // Notiek pārbaude – ja nav atrasts nevienu derīgu ierakstu, informējam lietotāju
        if (!schedule[scheduleDate].start || !schedule[scheduleDate].end) {
          statusEl.textContent = "Nav atrasti derīgi laiku ieraksti.";
          return;
        }
        
        // Parādām rezultātus tabulā
        for (const date in schedule) {
          const row = document.createElement("tr");
          const dateCell = document.createElement("td");
          dateCell.textContent = date;
          const startCell = document.createElement("td");
          startCell.textContent = schedule[date].start;
          const endCell = document.createElement("td");
          endCell.textContent = schedule[date].end;
          
          row.appendChild(dateCell);
          row.appendChild(startCell);
          row.appendChild(endCell);
          resultTableBody.appendChild(row);
        }
        
        statusEl.textContent = "Apstrāde pabeigta.";
      } catch (error) {
        console.error("Kļūda apstrādājot PDF:", error);
        statusEl.textContent = "Kļūda apstrādājot PDF.";
      }
    }
  </script>
</body>
</html>
